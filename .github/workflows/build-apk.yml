name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Prepare Static Assets for Capacitor
        run: |
          mkdir -p capacitor-build
          cp -a dist/client/. capacitor-build/ 2>/dev/null || cp -a dist/. capacitor-build/ 2>/dev/null || cp -a .output/public/. capacitor-build/ 2>/dev/null
          if [ -f "capacitor-build/_shell.html" ]; then
            mv capacitor-build/_shell.html capacitor-build/index.html
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 17 with Gradle Caching
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
