name: Build Android APK

on:
  push:
    branches: [ 'main', 'master' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Inject Supabase Keys Hardcoded
        run: |
          # Create or overwrite a local config file with your exact keys
          echo "export const SUPABASE_URL = 'https://nezxzcczncinlykpapfh.supabase.co';" > src/integrations/supabase/credentials.ts
          echo "export const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_35wAAHVPFUUVbyQ3NUPWcA_YIjasSn0';" >> src/integrations/supabase/credentials.ts

      - name: Build Web App (Node Server Preset)
        run: NITRO_PRESET=node-server npm run build

      - name: Capture Authentic App Shell for Capacitor
        run: |
          echo "Booting temporary Nitro server..."
          PORT=3000 node .output/server/index.mjs &
          
          echo "Waiting for server to initialize..."
          sleep 4
          
          echo "Capturing hydrated HTML..."
          curl -s http://localhost:3000 > .output/public/index.html
          
          echo "Shutting down temporary server..."
          pkill node

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 21 with Gradle Caching
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
