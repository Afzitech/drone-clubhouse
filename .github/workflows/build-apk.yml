name: Build Android APK (Production)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: CI=false npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK (Release)
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Generate Keystore & Sign APK
        working-directory: ./android/app/build/outputs/apk/release
        run: |
          # Generate a production certificate
          keytool -genkey -v -keystore production.keystore -alias production -keyalg RSA -keysize 2048 -validity 10000 -storepass "aeroforge2026" -keypass "aeroforge2026" -dname "CN=Afsal Rahman J, O=Aeroforge, L=Chennai, C=IN"
          
          # Locate apksigner and sign the release build
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          $BUILD_TOOLS/apksigner sign --ks production.keystore --ks-pass pass:aeroforge2026 --key-pass pass:aeroforge2026 --out app-release-signed.apk app-release-unsigned.apk

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: aeroforge-production-apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk