name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Generate Capacitor Entry HTML
        run: |
          CLIENT_JS=$(find .output/public/assets -name "client-*.js" -printf "%f\n" | head -n 1)
          CSS_FILE=$(find .output/public/assets -name "*.css" -printf "%f\n" | head -n 1)
          
          cat <<EOF > .output/public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>AeroForge</title>
              <link rel="stylesheet" href="assets/$CSS_FILE">
          </head>
          <body>
              <div id="root"></div>
              <script type="module" src="assets/$CLIENT_JS"></script>
          </body>
          </html>
          EOF

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 21 with Gradle Caching
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
