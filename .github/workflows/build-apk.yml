name: Build Android APK

on:
  push:
    branches: [ 'main', 'master' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build Static Web App
        env:
          VITE_SUPABASE_URL: "https://nezxzcczncinlykpapfh.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_35wAAHVPFUUVbyQ3NUPWcA_YIjasSn0"
          VITE_SUPABASE_PROJECT_ID: "nezxzcczncinlykpapfh"
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 21 with Gradle Caching
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
